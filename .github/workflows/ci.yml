name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: E2E test (binary protocol)
        # Builds the binary once inside TestMain and then exercises the full
        # LSP Content-Length+JSON-RPC round-trip over stdin/stdout.
        run: go test -v -count=1 -run TestE2E ./cmd/gov-lsp/

      - name: Smoke test
        run: |
          go build -o /tmp/gov-lsp ./cmd/gov-lsp
          GOV_LSP_POLICIES=./policies bash scripts/smoke_test.sh /tmp/gov-lsp

      - name: Hook test
        run: |
          GOV_LSP_POLICIES=./policies bash scripts/test_policy_gate.sh /tmp/gov-lsp

      - name: Install inotify-tools
        # Required for efficient filesystem-change detection in governance_loop.sh.
        # Without this, the script falls back to polling (3s intervals) which is
        # slower and may miss rapid changes during the headless-agent test.
        run: sudo apt-get install -y inotify-tools bats

      - name: Bats unit tests (governance loop helpers)
        # Run unit tests for logging helpers, workspace isolation guards, and
        # lsp_check.py without requiring a live copilot session.
        env:
          GOV_LSP_BINARY: /tmp/gov-lsp
          GOV_LSP_POLICIES_DIR: ${{ github.workspace }}/policies
        run: bats tests/governance_loop.bats

      - name: Install GitHub Copilot CLI
        # Required for the headless agent test.
        # Pattern from https://github.com/davidamitchell/Research/blob/main/.github/workflows/research-loop.yml
        run: npm install -g @github/copilot

      - name: Headless agent test
        # Exercises the full headless-agent enforcement loop:
        #   authenticated copilot agent → creates a policy-violating file → gov-lsp catches it
        # Invocation pattern matches https://github.com/davidamitchell/Research/blob/main/.github/workflows/research-loop.yml
        # Requires COPILOT_GITHUB_TOKEN secret exported as GH_TOKEN.  The test fails
        # intentionally in environments where that secret is absent — that is the correct
        # result for an unconfigured headless-agent environment.
        #
        # GOV_LSP_POLICIES is given as an absolute path so the governance loop does not
        # rely on the working directory when resolving policy files.
        # WORKSPACE is explicitly unset here (and again inside the test script) so the
        # test's isolated mktemp workspace cannot be overridden by a CI runner that
        # pre-sets WORKSPACE to the repository root.
        #
        # LOG_LEVEL=verbose activates full protocol tracing in the governance loop:
        # exact prompts, exact CLI commands, raw JSON-RPC request/response pairs, and
        # the complete agent output are all visible in the CI log for this step.
        id: agent-test
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GOV_LSP_POLICIES: ${{ github.workspace }}/policies
          # Setting WORKSPACE to the empty string overrides any runner-provided
          # WORKSPACE env var (e.g., Jenkins sets this to the build dir).
          # The test script also runs `unset WORKSPACE` before calling mktemp,
          # so this is a belt-and-suspenders defence against env contamination.
          WORKSPACE: ""
          # verbose activates full JSON-RPC traces, exact prompt logs, and raw
          # agent output in the CI log.  Use debug for a less verbose run.
          LOG_LEVEL: verbose
        run: |
          bash scripts/test_headless_agent.sh /tmp/gov-lsp
        continue-on-error: true

      - name: Upload agent debug logs
        # Always upload logs so LSP JSON-RPC traffic and agent reasoning are
        # available for post-mortem analysis regardless of test outcome.
        # Path comes from the step output to support parallel runs using mktemp.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-agent-debug-logs
          path: ${{ steps.agent-test.outputs.agent_logs }}
          if-no-files-found: ignore

      - name: Policy check (self-governance)
        # Scan only the production Go source directories (cmd/ and internal/).
        # These contain no intentional violations and must remain clean.
        # docs/, research/, and policies/ are excluded: they contain .md files
        # with deliberately non-SCREAMING_SNAKE_CASE names used as demo examples.
        # Scanning the entire repo root (. ) would report 15+ expected violations
        # on README.md / CONTRIBUTING.md and defeat workspace isolation.
        run: |
          GOV_LSP_POLICIES=./policies /tmp/gov-lsp check --format text cmd/ internal/
