name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: E2E test (binary protocol)
        # Builds the binary once inside TestMain and then exercises the full
        # LSP Content-Length+JSON-RPC round-trip over stdin/stdout.
        run: go test -v -count=1 -run TestE2E ./cmd/gov-lsp/

      - name: Smoke test
        run: |
          go build -o /tmp/gov-lsp ./cmd/gov-lsp
          GOV_LSP_POLICIES=./policies bash scripts/smoke_test.sh /tmp/gov-lsp

      - name: Policy check (self-governance)
        # Run gov-lsp check against the whole repo.
        # This job intentionally exits non-zero on docs/ violations (those are
        # expected demo violations) but the step is annotated as informational
        # so it does not block the build. A consumer repo would remove the
        # || true to make this a hard gate.
        run: |
          GOV_LSP_POLICIES=./policies /tmp/gov-lsp check --format text . || true
