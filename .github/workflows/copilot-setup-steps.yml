name: Copilot Setup Steps

# This workflow is executed by GitHub Copilot's coding agent before it starts
# working on an issue or pull request. It prepares the environment so the agent
# has access to gov-lsp tooling and the gh copilot CLI during its session.
#
# Ref: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    name: Setup Copilot Environment
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build gov-lsp
        run: go build -o gov-lsp ./cmd/gov-lsp

      - name: Verify gov-lsp works
        run: |
          GOV_LSP_POLICIES=./policies ./gov-lsp check --format text . && echo "no violations" || true

      - name: Install policy check alias
        # Make 'gov-lsp' available on PATH for the remainder of the agent session.
        run: |
          mkdir -p "$HOME/.local/bin"
          cp gov-lsp "$HOME/.local/bin/gov-lsp"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download gh copilot CLI
        # `gh copilot` is built into the gh CLI and auto-downloads the Copilot CLI
        # binary on first invocation. Authenticate with a PAT (copilot scope) stored
        # as COPILOT_GITHUB_TOKEN in Settings → Secrets → Actions.
        # Ref: https://cli.github.com/manual/gh_copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: gh copilot -- --help
        continue-on-error: true

      - name: Read agent instructions
        run: |
          echo "=== AGENT INSTRUCTIONS ==="
          cat AGENTS.md
          echo ""
          echo "=== POLICY ENFORCEMENT NOTICE ==="
          echo "gov-lsp is available. Run 'gov-lsp check .' to verify policy compliance."
          echo "Violations must be fixed before submitting changes."
