name: Copilot Setup Steps

# This workflow is executed by GitHub Copilot's coding agent before it starts
# working on an issue or pull request. It prepares the environment so the agent
# has access to gov-lsp tooling during its session.
#
# Ref: https://docs.github.com/en/copilot/using-github-copilot/using-copilot-coding-agent-to-work-on-tasks/about-copilot-coding-agent

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    name: Setup Copilot Environment
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      # GH_TOKEN is the standard env var used by gh CLI for authentication.
      # GH_COPILOT_CLI_KEY must be a PAT with the `copilot` scope set in
      # repository secrets: Settings → Secrets → Actions → New repository secret.
      GH_TOKEN: ${{ secrets.GH_COPILOT_CLI_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build gov-lsp
        run: go build -o gov-lsp ./cmd/gov-lsp

      - name: Verify gov-lsp works
        run: |
          GOV_LSP_POLICIES=./policies ./gov-lsp check --format text . && echo "no violations" || true

      - name: Install policy check alias
        # Make 'gov-lsp' available on PATH for the remainder of the agent session.
        run: |
          mkdir -p "$HOME/.local/bin"
          cp gov-lsp "$HOME/.local/bin/gov-lsp"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install gh copilot extension
        # Installs the GitHub Copilot CLI extension so the agent can use
        # 'gh copilot suggest' and 'gh copilot explain' during the session.
        # Requires GH_COPILOT_CLI_KEY secret (PAT with 'copilot' scope).
        run: gh extension install github/gh-copilot
        # Skip gracefully if the secret is not yet configured.
        continue-on-error: true

      - name: Verify gh copilot CLI
        run: gh copilot --version
        continue-on-error: true

      - name: Read agent instructions
        run: |
          echo "=== AGENT INSTRUCTIONS ==="
          cat AGENTS.md
          echo ""
          echo "=== POLICY ENFORCEMENT NOTICE ==="
          echo "gov-lsp is available. Run 'gov-lsp check .' to verify policy compliance."
          echo "Violations must be fixed before submitting changes."
